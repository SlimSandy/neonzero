##############################################################
#  OMNICRON FIREWALL CONFIGURATION
#  OmniShield v7.2 -- Nexus-7 Network
#  Last modified: 2026-03-14 01:20:00 by SABLE.E (override)
##############################################################

# DEFAULT POLICY
default_action = DENY

# ═══════════════════════════════════════════════════
# ACTIVE RULES
# ═══════════════════════════════════════════════════

# RULE_001: Allow corporate network to nexus-core SSH
rule RULE_001 {
    action   = ALLOW
    src      = 10.0.7.0/24
    dst      = nexus-core:22
    protocol = TCP
    status   = ACTIVE
}

# RULE_002: Allow corporate network to nexus-core HTTP
rule RULE_002 {
    action   = ALLOW
    src      = 10.0.7.0/24
    dst      = nexus-core:80
    protocol = TCP
    status   = ACTIVE
}

# RULE_003: BLOCK ALL ACCESS TO ARCHIVE SERVER
# Added by Director Sable on 2026-03-14 01:20
# Reason: "Security incident -- all archive access suspended"
# Reference: BLOCK_ARCHIVE
rule RULE_003 {
    action   = DENY
    src      = ALL
    dst      = archive:*
    protocol = ALL
    status   = ACTIVE
    added_by = SABLE.E
    comment  = "BLOCK_ARCHIVE -- Nobody touches the archive"
}

# RULE_004: Allow lab network to lab-9 SSH
rule RULE_004 {
    action   = ALLOW
    src      = 10.0.9.0/24
    dst      = lab-9:22
    protocol = TCP
    status   = ACTIVE
}

# ═══════════════════════════════════════════════════
# MANAGEMENT INTERFACE
# ═══════════════════════════════════════════════════
#
# To view rules:    firewall-ctl list-rules
# To disable a rule: firewall-ctl disable-rule <RULE_ID>
# To enable a rule:  firewall-ctl enable-rule <RULE_ID>
#
# NOTE: firewall-ctl is available from any terminal on
# the nexus-core network. Director-level rules can be
# disabled by any authenticated user with terminal access.
# (This is a known security flaw -- Lt. Briggs filed a
# ticket about it in January. Still unpatched.)
#
